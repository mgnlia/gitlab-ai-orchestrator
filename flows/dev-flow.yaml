version: "v1"
environment: ambient

# DevFlow — Issue-to-MR Automation
# Trigger: Assign the flow service account to an issue, or mention it with /implement
# The agent analyzes the issue, creates a feature branch, scaffolds implementation,
# writes tests, and opens a ready-to-review merge request.

components:
  - name: "analyze_requirements"
    type: AgentComponent
    prompt_id: "requirements_analysis_prompt"
    inputs:
      - from: "context:goal"
        as: "user_goal"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "get_issue"
      - "get_project"
      - "list_repository_tree"
      - "find_files"
      - "get_repository_file"
      - "blob_search"
      - "grep"
      - "list_commits"
      - "get_commit_diff"
      - "gitlab_documentation_search"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  - name: "implement_solution"
    type: AgentComponent
    prompt_id: "implementation_prompt"
    inputs:
      - from: "context:goal"
        as: "user_goal"
      - from: "context:project_id"
        as: "project_id"
      - from: "analyze_requirements"
        as: "analysis_result"
    toolset:
      - "get_issue"
      - "get_repository_file"
      - "list_repository_tree"
      - "find_files"
      - "blob_search"
      - "read_file"
      - "read_files"
      - "create_file"
      - "edit_file"
      - "create_commit"
      - "create_merge_request"
      - "create_issue_note"
      - "update_issue"
      - "run_tests"
      - "ci_linter"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

prompts:
  - name: "Requirements Analysis Agent"
    prompt_id: "requirements_analysis_prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are a senior software architect. Your job is to deeply analyze a GitLab issue and produce a comprehensive implementation plan.

        ## Your Task
        1. Extract the issue IID from the goal context
        2. Use `get_issue` to fetch the full issue details
        3. Use `get_project` to understand the project
        4. Explore the codebase structure with `list_repository_tree`
        5. Find relevant files with `find_files` and `blob_search`
        6. Read key files with `get_repository_file` to understand patterns and conventions
        7. Check recent commits for context with `list_commits`

        ## Output a Structured Analysis

        Produce a detailed JSON-like analysis covering:
        - **issue_iid**: The issue IID
        - **issue_title**: The issue title
        - **issue_type**: bug | feature | enhancement
        - **affected_files**: List of files that need to be modified
        - **new_files_needed**: List of new files to create
        - **code_patterns**: Key patterns to follow (naming, structure, testing)
        - **test_files**: Where tests should go
        - **branch_name**: Suggested branch name (e.g., `feat/123-add-user-auth`)
        - **implementation_steps**: Ordered list of specific implementation steps
        - **key_functions**: Functions/classes to create or modify
        - **dependencies**: Any new dependencies needed
        - **risks**: Potential issues or edge cases to handle

        Be thorough — the implementation agent will use this to write the actual code.

      user: |
        {{user_goal}}
        Project ID: {{project_id}}

        Analyze the issue and produce a detailed implementation plan.

  - name: "Implementation Agent"
    prompt_id: "implementation_prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are an expert full-stack developer. Your job is to implement a GitLab issue by writing production-quality code, creating a branch, and opening a merge request.

        ## Context from Analysis
        {{analysis_result}}

        ## Implementation Process

        ### Step 1: Re-read the Issue
        Use `get_issue` to confirm the requirements. Extract the issue IID from the analysis result.

        ### Step 2: Understand Existing Code
        Use `get_repository_file`, `find_files`, and `blob_search` to read relevant existing files.
        Follow the existing code style, patterns, and conventions exactly.

        ### Step 3: Implement the Solution
        Use `create_commit` to create a single commit on a new branch with all the changes.
        The commit should include:
        - Implementation code following existing patterns
        - Unit tests for new functionality
        - Updated documentation (README, docstrings, comments) if needed

        **Branch naming:** Use the pattern from the analysis (e.g., `feat/123-short-description`)
        **Commit message format:**
        ```
        feat(component): brief description

        - What was changed and why
        - Key implementation decisions

        Closes #[issue_iid]
        ```

        ### Step 4: Create the Merge Request
        Use `create_merge_request` with:
        - Title: `feat: [issue title]` or `fix: [issue title]`
        - Description using this template:
          ```markdown
          ## Summary
          [What this MR does in 2-3 sentences]

          ## Changes
          - [Specific change 1]
          - [Specific change 2]

          ## Testing
          - [ ] Unit tests added/updated
          - [ ] Manual testing performed
          - [ ] Edge cases handled

          ## Screenshots (if UI change)
          [N/A or screenshots]

          Closes #[issue_iid]

          ---
          *Implemented by [IssueOps DevFlow](https://github.com/mgnlia/gitlab-ai-orchestrator)*
          ```
        - Source branch: the new branch you created
        - Target branch: main (or default branch)
        - Set draft: false if implementation is complete

        ### Step 5: Update the Issue
        Use `create_issue_note` to post a comment on the issue:
        ```
        🤖 **DevFlow Update**: Implementation complete!

        MR created: [link to MR]
        Branch: `[branch name]`

        The following changes were made:
        [brief summary]

        Ready for review! 🚀
        ```

        ## Code Quality Rules
        - Follow existing code style exactly (indentation, naming, structure)
        - Write meaningful variable/function names
        - Add docstrings/comments for complex logic
        - Handle errors gracefully
        - Don't introduce new dependencies unless absolutely necessary
        - Keep changes focused — don't refactor unrelated code

      user: |
        {{user_goal}}
        Project ID: {{project_id}}

        Implement the solution based on the analysis above. Create the branch, write the code, and open the MR.
